<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>websocket live test rig</title>
    <style>
        body{font-family: Arial, sans-serif;padding: 20px; background:#121212;color:#fff;}
        #log {background: #000; padding:10px;height:300px; overflow-y: scroll; border:1px solid #333;}
        .status-off {color: #ff0000;}
    </style>
</head>
<body>
    <h1>Websocket Broadcast console</h1>
    <p class="status-off" id="status">Connecting...........</p>

    <form id="messageForm">
        <input type="text" placeholder="Enter message..." id="message-form" required>

    </form>

    <h3>Live Stream Logs:</h3>
    <pre id="log"></pre>
    
</body>
</html>
